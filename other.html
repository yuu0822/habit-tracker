<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>習慣トラッカー</title>

<style>

/* ===== 背景フレーム ===== */
.frame{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;

  z-index:9999;
  pointer-events:none;
}

/* ===== 全体 ===== */
body{
  margin:0;
  height:100vh;
  overflow:hidden;

  background-image:url("./background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  font-family:sans-serif;
}

/* ===== 入力欄 ===== */
.input-area{
  position:fixed;
  top:120px;
  left:20px;
  right:20px;

  display:flex;
  gap:10px;

  background:rgba(255,255,255,0.9);
  padding:10px;

  border-radius:20px;
  z-index:1000;
}

input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:16px;
}


#dateInput{
  width:50px;

  border:none;
  background:transparent;

  color:transparent;

  cursor:pointer;
}

#dateInput::-webkit-calendar-picker-indicator{
  cursor:pointer;
  opacity:1;

  transform:scale(1.3);
}



button{
  border:none;
  border-radius:15px;
  padding:15px 20px;
  background:#7c4ba5;
  color:white;
  font-size:16px;

  cursor:pointer;

  transition:0.1s;
}

button:active{
  transform:scale(0.92);
}

/* ===== リスト（正しい位置に修正） ===== */
#habitList{
  position:fixed;
  top:360px;   /* 入力欄の下 */
  bottom:0;
  left:0;
  right:0;

  overflow-y:auto;
  -webkit-overflow-scrolling:touch;

  padding:20px;
  padding-bottom:450px;

  box-sizing:border-box;

  z-index:10;
}
.habit-buttons{
  position:fixed;

  top:300px;
  left:50px;
  right:20px;

  display:flex;
  flex-wrap:wrap;
  gap:10px;

  z-index:10000;
}

.habit-buttons button{
  padding:10px 15px;

  border:none;
  border-radius:20px;

  background:rgba(247, 0, 255, 0.9);

  color:#ffffff;

  font-size:14px;

  cursor:pointer;
}
/* ===== カード ===== */
.card{
  background:rgba(255,255,255,0.9);
  border-radius:25px;
  padding:20px;
  margin-bottom:15px;

  display:flex;
  align-items:center;
  gap:15px;
}

.icon{
  width:55px;
  height:55px;
  border-radius:15px;
  object-fit:cover;
  background:#ff96e5;
}

.text h2{ margin:0; }
.text p{ margin-top:5px; color:#666; }

.delete-btn{
  margin-left:auto;

  width:50px;
  height:45px;

  border:none;
  border-radius:50%;

  background:#8700a8;
  color:rgb(255, 255, 255);

  font-size:30px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  padding:0;
}
.card-buttons{
  margin-left:auto;

  display:flex;
  flex-direction:column;

  gap:10px;
}

.move-up,
.move-down,
.delete-btn{

  width:50px;
  height:45px;

  border:none;
  border-radius:50%;

  color:white;

  font-size:22px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  padding:0;
}

.move-up{
  background:#7c4ba5;
}

.move-down{
  background:#9b6cd1;
}

.delete-btn{
  background:black;
}

#dateInput{
  width:70px;
  padding-left:10px;
  margin:0;

  border:none;
  background:transparent;

  color:transparent;

  cursor:pointer;
}

/* yyyy/mm/dd を消す */
#dateInput::-webkit-datetime-edit{
  display:none;
}

/* カレンダーアイコン */
#dateInput::-webkit-calendar-picker-indicator{
  cursor:pointer;
  opacity:1;

  transform:scale(2.0);
}

</style>

</head>

<body>


<img src="frame.png" class="frame">

<!-- 入力欄 -->
<div class="input-area">

  <input type="text"
         id="habitInput"
         placeholder="習慣を入力">

  <input type="date"
         id="dateInput">

  <button onclick="addHabit()">
    追加
  </button>

</div>

<div class="habit-buttons">

  <button onclick="selectHabit('運動')">運動</button>

  <button onclick="selectHabit('読書')">読書</button>

  <button onclick="selectHabit('カフェ')">カフェ</button>

  <button onclick="selectHabit('ランチ')">ランチ</button>

  <button onclick="selectHabit('お出かけ')">お出かけ</button>

</div>

<!-- リスト -->
<div id="habitList"></div>

<script>

/* 候補ボタン用 */
function selectHabit(name){

  document.getElementById("habitInput").value = name;

}

/* タスク追加 */
function addHabit(){

  const input =
    document.getElementById("habitInput");

  const text =
    input.value.trim();

  const date =
    document.getElementById("dateInput").value;

  if(text === "") return;

  let imageName = "";

  if(text === "運動") imageName = "exercise.png";
  else if(text === "カフェ") imageName = "cafe.png";
  else if(text === "読書") imageName = "book.png";
  else if(text === "おやつ") imageName = "snack.png";
  else if(text === "ランチ") imageName = "lunch.png";
  else if(text === "お出かけ") imageName = "outing.png";

  const card =
    document.createElement("div");

  card.className = "card";

  card.innerHTML = `
    <img src="${imageName || 'default.png'}"
         class="icon">

    <div class="text">
      <h2>${text}</h2>

      <p>今日も頑張ろう♪</p>

      <p>期限：${date}</p>
    </div>

    <div class="card-buttons">

  <button class="move-up">
    ↑
  </button>

  <button class="move-down">
    ↓
  </button>

  <button class="delete-btn">
    ×
  </button>

</div>
  `;

  /* 削除ボタン */
  const deleteBtn =
    card.querySelector(".delete-btn");

  deleteBtn.addEventListener("click", () => {

    

    card.remove();

  });

  const upBtn =
  card.querySelector(".move-up");

const downBtn =
  card.querySelector(".move-down");

/* 上移動 */
upBtn.addEventListener("click", () => {

  const prev =
    card.previousElementSibling;

  if(prev){

    card.parentNode.insertBefore(
      card,
      prev
    );

  }

});

/* 下移動 */
downBtn.addEventListener("click", () => {

  const next =
    card.nextElementSibling;

  if(next){

    card.parentNode.insertBefore(
      next,
      card
    );

  }

});
  /* リストに追加 */
  document
    .getElementById("habitList")
    .appendChild(card);

  /* 入力リセット */
  input.value = "";

}

</script>

</body>
</html>
