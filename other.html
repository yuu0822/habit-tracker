<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>習慣トラッカー</title>

<style>

/* ===== 全体 ===== */
body{
  margin:0;
  height:100vh;
  overflow:hidden;

  background-image:url("./background.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  font-family:sans-serif;
}

/* ===== 戻るボタン ===== */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;

  padding:10px 18px;
  border-radius:20px;

  background:rgba(0,0,0,0.6);
  color:white;

  z-index:9999;
  border:none;
  cursor:pointer;
}

/* ===== 入力欄 ===== */
.input-area{
  position:fixed;
  top:140px;
  left:20px;
  right:20px;

  display:flex;
  gap:10px;

  background:rgba(255,255,255,0.9);
  padding:10px;

  border-radius:20px;
  z-index:1000;
}

input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:16px;
}

#dateInput{
  width:70px;
  background:transparent;
  border:none;
  color:black;
}

/* カレンダーアイコン */
#dateInput::-webkit-calendar-picker-indicator{
  cursor:pointer;
  transform:scale(1.3);
}

/* ===== 追加ボタン ===== */
button{
  border:none;
  border-radius:15px;
  padding:15px 20px;
  background:rgb(174,0,255);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.1s;
}

button:active{
  transform:scale(0.92);
}

/* ===== 候補ボタン ===== */
.habit-buttons{
  position:fixed;
  top:240px;
  left:20px;
  right:20px;

  display:flex;
  flex-wrap:wrap;
  gap:10px;

  z-index:999;
}

.habit-buttons button{
  padding:10px 15px;
  border-radius:20px;
  background:rgba(200,0,255,0.9);
  font-size:14px;
}

/* ===== リスト ===== */
#habitList{
  position:fixed;
  top:320px;
  bottom:0;
  left:0;
  right:0;

  overflow-y:auto;
  padding:20px;
  box-sizing:border-box;
}

/* ===== カード ===== */
.card{
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;

  display:flex;
  align-items:center;
  gap:10px;
}

.icon{
  width:50px;
  height:50px;
  border-radius:10px;
}

/* ===== カードボタン ===== */
.card-buttons{
  margin-left:auto;
  display:flex;
  gap:5px;
}

.card-buttons button{
  width:40px;
  height:40px;
  border-radius:50%;
  font-size:18px;
  padding:0;
}

/* ===== スマホ ===== */
@media screen and (max-width:500px){

  .input-area{
    gap:5px;
    padding:8px;
  }

  #dateInput{
    width:50px;
  }

  button{
    padding:12px 14px;
    font-size:14px;
  }

  #dateInput::-webkit-calendar-picker-indicator{
    transform:scale(0.8);
  }
}

</style>

</head>

<body>

<!-- 戻る -->
<button class="back-btn" onclick="location.href='index.html'">
戻る
</button>

<!-- 入力 -->
<div class="input-area">

  <input type="text" id="habitInput" placeholder="習慣を入力">
  <input type="date" id="dateInput">
  <button onclick="addHabit()">追加</button>

</div>

<!-- 候補 -->
<div class="habit-buttons">
  <button onclick="selectHabit('運動')">運動</button>
  <button onclick="selectHabit('読書')">読書</button>
  <button onclick="selectHabit('カフェ')">カフェ</button>
  <button onclick="selectHabit('ランチ')">ランチ</button>
  <button onclick="selectHabit('お出かけ')">お出かけ</button>
</div>

<!-- リスト -->
<div id="habitList"></div>

<script>

/* ===== データ取得 ===== */
function getData(){
  return JSON.parse(localStorage.getItem("habitData")) || [];
}

/* ===== 保存（完全同期） ===== */
function saveAll(){

  const data = [];

  document.querySelectorAll(".card").forEach(card => {

    data.push({
      text: card.querySelector("h2").textContent,
      date: card.querySelector("p:nth-of-type(2)").textContent.replace("期限：",""),
      image: card.querySelector(".icon").getAttribute("src")
    });

  });

  localStorage.setItem("habitData", JSON.stringify(data));
}

/* ===== カード作成 ===== */
function createCard(text, date, image){

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${image || 'default.png'}" class="icon">

    <div>
      <h2>${text}</h2>
      <p>今日も頑張ろう♪</p>
      <p>期限：${date}</p>
    </div>

    <div class="card-buttons">
      <button class="up">↑</button>
      <button class="down">↓</button>
      <button class="del">×</button>
    </div>
  `;

  card.querySelector(".del").onclick = () => {
    card.remove();
    saveAll();
  };

  card.querySelector(".up").onclick = () => {
    const prev = card.previousElementSibling;
    if(prev){
      card.parentNode.insertBefore(card, prev);
      saveAll();
    }
  };

  card.querySelector(".down").onclick = () => {
    const next = card.nextElementSibling;
    if(next){
      card.parentNode.insertBefore(next, card);
      saveAll();
    }
  };

  document.getElementById("habitList").appendChild(card);
}

/* ===== 追加 ===== */
function addHabit(){

  const input = document.getElementById("habitInput");
  const text = input.value.trim();
  const date = document.getElementById("dateInput").value;

  if(!text) return;

  let imageName = "";

  if(text === "運動") imageName = "exercise.png";
  else if(text === "カフェ") imageName = "cafe.png";
  else if(text === "読書") imageName = "book.png";
  else if(text === "おやつ") imageName = "snack.png";
  else if(text === "ランチ") imageName = "lunch.png";
  else if(text === "お出かけ") imageName = "outing.png";

  createCard(text, date, imageName);
  saveAll();

  input.value = "";
}

/* ===== 候補 ===== */
function selectHabit(name){
  document.getElementById("habitInput").value = name;
}

/* ===== 読み込み ===== */
window.onload = () => {
  getData().forEach(item => {
    createCard(item.text, item.date, item.image);
  });
};

</script>

</body>
</html>
