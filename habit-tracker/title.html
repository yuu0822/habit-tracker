<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

body{
  margin:0;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:#f6d8ff;
}

body{
  margin:0;
  height:100vh;

  background-image:url("background.jpg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* タイトル */
h1{
  color:#7c4ba5;
  font-size:60px;
}

/* 画像ボタン */
.start-button{
  width:250px;

  cursor:pointer;

  transition:0.1s;
}

.start-button:active{
  transform:scale(0.9);
}

.logo{
  width:350px;
  margin-bottom:30px;
}

.frame{
  position:fixed;
  top:-30;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:9999;

  pointer-events:none;
}
</style>

</head>

<body>

<img src="logo.png"
     class="logo">

<img src="newstart.png"
     class="start-button"
     onclick="startApp()">

<script>

function startApp(){

  location.href = "index.html";

}

</script>

</body>
<img src="frame.png"
     class="frame">

</html>
