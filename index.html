<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

/* ===== 背景 ===== */
body{
  margin:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding-top:280px; /* ←ここで全体位置固定 */

  background-image:url("background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ===== 全体まとめ ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;

  position:relative;
  z-index:2;
}

/* ===== ロゴ ===== */
.logo{
  width:600px;
  margin-bottom:-50px; /* ロゴとボタンの距離固定 */
}

/* ===== スタートボタン ===== */
.start-button{
  width:360px;
  cursor:pointer;
  transition:0.15s;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

  position:relative;
  z-index:3;
}

.start-button:active{
  transform:scale(0.92);
}

/* ===== フレーム ===== */
.frame{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:1;
  pointer-events:none;
}

</style>

</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <img src="newstart.png"
       class="start-button"
       onclick="startApp()">

</div>

<script>
function startApp(){
  const btn = document.querySelector(".start-button");

  btn.style.transform = "scale(0.92)";

  setTimeout(() => {
    location.href = "other.html";
  }, 120);
}
</script>

<img src="frame.png" class="frame">

</body>
