<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

/* ===== 背景 ===== */
body{
  margin:0;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background-image:url("background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ===== 中央まとめ用 ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;

  /* ←ここで全体ちょい上げ（PCもスマホも） */
  transform: translateY(-40px);
}

/* ===== ロゴ ===== */
.logo{
  width:350px;
}

/* ===== スタートボタン ===== */
.start-button{
  width:250px;
  cursor:pointer;
  transition:0.15s;
  display:block;

  pointer-events:auto;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.start-button:active{
  transform:scale(0.92);
}

/* ===== フレーム ===== */
.frame{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:9999;
  pointer-events:none;
}

/* ===== スマホだけ微調整（必要なら） ===== */
@media (max-width: 600px){
  .container{
    transform: translateY(-20px);
  }
}

</style>

</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <img src="newstart.png"
       class="start-button"
       onclick="startApp()">

</div>

<script>
function startApp(){
  const btn = document.querySelector(".start-button");

  btn.style.transform = "scale(0.92)";

  setTimeout(() => {
    location.href = "other.html";
  }, 120);
}
</script>

<img src="frame.png" class="frame">

</body>
</html>
