<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

/* ===== 背景 ===== */
body{
   display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:120px;


  background-image:url("background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ===== 全体まとめ ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;

  /* ★ここがポイント：少し上にずらす */
  transform: translateY(-30px);
}

/* ===== ロゴ ===== */
.logo{
  width:500px;
  margin-bottom:20px;
}

/* ===== スタートボタン ===== */
.start-button{
  width:360px;
  cursor:pointer;
  transition:0.15s;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.start-button:active{
  transform:scale(0.92);
}

/* ===== フレーム ===== */
.frame{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:9999;
  pointer-events:none;
}


</style>

</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <img src="newstart.png"
       class="start-button"
       onclick="startApp()">

</div>

<script>
function startApp(){
  const btn = document.querySelector(".start-button");

  btn.style.transform = "scale(0.92)";

  setTimeout(() => {
    location.href = "other.html";
  }, 120);
}
</script>

<img src="frame.png" class="frame">

</body>
</html>
