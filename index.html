<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

body{
  margin:0;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background-image:url("background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ロゴ */
.logo{
  width:350px;
  margin-bottom:30px;
}

/* スタートボタン（画像だけどボタン扱い） */
.start-button{
  width:250px;
  cursor:pointer;
  transition:0.15s;
  display:block;

  /* これで1発クリック安定 */
  pointer-events:auto;
}

.start-button:active{
  transform:scale(0.92);
}

/* フレーム */
.frame{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:9999;
  pointer-events:none;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<img src="newstart.png"
     class="start-button"
     onclick="startApp()">

<script>
function startApp(){
  location.href = "other.html";
}
</script>

<img src="frame.png" class="frame">

</body>
</html>
