<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>タイトル</title>

<style>

/* ===== 背景 ===== */
body{
  margin:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding-top:280px;

  background-image:url("background.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ===== スマホ専用 ===== */
@media screen and (max-width: 500px){

  .container{

    transform:translateY(250px);

  }

}

/* ===== 全体まとめ ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;

  position:relative;
  z-index:2;

  transform:translateY(200px);
}

.back-btn{

  position:fixed;

  top:20px;
  left:20px;

  padding:12px 24px;

  border:none;
  border-radius:20px;

  background:rgba(0,0,0,0.6);

  color:white;

  font-size:18px;

  cursor:pointer;

  z-index:99999;

  transition:0.1s;

}

.back-btn:active{

  transform:scale(0.92);

}
/* ===== ロゴ ===== */
.logo{
  width:600px;
  margin-bottom:-30px;
}

/* ===== スタートボタン ===== */
.start-button{
  width:360px;
  cursor:pointer;
  transition:0.15s;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

  position:relative;
  z-index:3;
}

.start-button:active{
  transform:scale(0.92);
}

/* ===== 占いボタン ===== */
.fortune-button{

  width:360px;

  cursor:pointer;

  transition:0.15s;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

  position:relative;

  z-index:3;

}

.fortune-button:active{

  transform:scale(0.92);

}


</style>

</head>

<body>


<div class="container">

  <img src="logo.png" class="logo">

  <!-- スタート -->
  <img src="newstart.png"
       class="start-button"
       onclick="startApp()">

  <!-- 占いの館 -->
  <img src="fortune-button.png"
       class="fortune-button"
       onclick="goFortune()">

</div>

<script>

function goBack(){

  location.href = "index.html";

}
function startApp(){

  const btn =
    document.querySelector(".start-button");

  btn.style.transform = "scale(0.92)";

  setTimeout(() => {

    location.href = "other.html";

  }, 120);

}

function goFortune(){

  const btn =
    document.querySelector(".fortune-button");

  btn.style.transform = "scale(0.92)";

  setTimeout(() => {

    location.href = "fortune.html";

  }, 120);

}

</script>

</body>
</html>
