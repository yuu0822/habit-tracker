<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>占いの館</title>

<style>

body{
  margin:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background-image:url("./fortune-background.png");
  background-size:cover;
  background-position:center;

  font-family:sans-serif;
}

/* 戻る */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;

  padding:12px 24px;
  border:none;
  border-radius:20px;

  background:rgb(174, 0, 255);
  color:white;
  font-size:18px;

  cursor:pointer;
  z-index:99999;

  transition:0.1s;
}

.back-btn:active{
  transform:scale(0.92);
}

/* 水晶玉 */
.crystal-ball{
  width:250px;
  position:absolute;
  top:75px;
  pointer-events:none;
}

/* 結果 */
.fortune-result{
  position:absolute;
  top:260px;
  width:200px;

  text-align:center;
  font-size:40px;
  color:black;

  z-index:10;
}

/* 占うボタン */
.fortune-btn{
  position:absolute;
  bottom:0px;

  padding:15px 40px;
  border:none;
  border-radius:20px;

  background:#b06cff;
  color:white;

  font-size:24px;
  cursor:pointer;

  transition:0.1s;
}

.fortune-btn:active{
  transform:scale(0.92);
}

/* スマホ */
@media screen and (max-width:500px){

  .crystal-ball{
    width:220px;
    top:90px;
  }

  .fortune-result{
    top:250px;
    font-size:34px;
  }

  .fortune-btn{
    bottom:40px;
    font-size:20px;
    padding:14px 34px;
  }
}

</style>
</head>

<body>

<!-- 戻る -->
<button class="back-btn"
onclick="location.href='index.html'">
戻る
</button>

<!-- 結果 -->
<div class="fortune-result"
     id="fortuneResult"></div>

<!-- 占う -->
<button class="fortune-btn"
        onclick="drawFortune()">
占う
</button>

<!-- 水晶玉 -->
<img src="crystal-ball.png"
     class="crystal-ball">

<script>

const fortunes = [
  "大吉<br>⭐︎⭐︎⭐︎⭐︎",
  "中吉<br>⭐︎⭐︎⭐︎",
  "中吉<br>⭐︎⭐︎⭐︎",
  "中吉<br>⭐︎⭐︎⭐︎",
  "中吉<br>⭐︎⭐︎⭐︎",
  "小吉<br>⭐︎⭐︎",
  "小吉<br>⭐︎⭐︎",
  "小吉<br>⭐︎⭐︎",
  "小吉<br>⭐︎⭐︎",
  "凶<br>⭐︎"
];

/* 保存 */
function saveFortune(result) {
  const data =
    JSON.parse(
      localStorage.getItem("fortuneData")
    ) || [];

  const today =
    new Date().toLocaleDateString("ja-JP");

  data.unshift({
    result: result,
    date: today
  });

  localStorage.setItem(
    "fortuneData",
    JSON.stringify(data)
  );
}

/* 占う */
function drawFortune() {
  const today =
    new Date().toLocaleDateString("ja-JP");

  const lastDate =
    localStorage.getItem("lastFortuneDate");

  const savedResult =
    localStorage.getItem("todayFortune");

  // 今日すでに占ってたら前回結果を表示
  if (lastDate === today && savedResult) {
    document
      .getElementById("fortuneResult")
      .innerHTML = savedResult;
    return;
  }

  // 新しく占う
  const randomFortune =
    fortunes[
      Math.floor(
        Math.random() * fortunes.length
      )
    ];

  document
    .getElementById("fortuneResult")
    .innerHTML = randomFortune;

  // 履歴保存用（HTMLタグ除去）
  const cleanText =
    randomFortune.replace(/<br>/g, " ");

  saveFortune(cleanText);

  // 今日の結果保存
  localStorage.setItem(
    "lastFortuneDate",
    today
  );

  localStorage.setItem(
    "todayFortune",
    randomFortune
  );
}

</script>

</body>
</html>
