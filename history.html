<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去の記録</title>

<style>

body{
  margin:0;
  min-height:100vh;
  overflow-y:auto;

  background-image:url("./background.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  font-family:sans-serif;
}

/* 戻る */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;

  padding:12px 24px;
  border:none;
  border-radius:20px;

  background:rgb(174, 0, 255);
  color:white;
  font-size:16px;

  cursor:pointer;
  z-index:99999;
}

.back-btn:active{
  transform:scale(0.92);
}

/* 全体 */
.container{
  padding:100px 20px 80px;
}

/* タイトル */
.title{
  text-align:center;
  position:absolute;
  top:60px;
  color:white;
  font-size:34px;
  margin-bottom:30px;
}

/* セクション */
.section-title{
  color:white;
  font-size:24px;
  margin:30px 0 15px;
}

/* カード */
.card{
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:18px;
  margin-bottom:15px;

  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.card h2{
  margin:0;
  font-size:20px;
}

.card p{
  margin:6px 0 0;
  color:#555;
}

/* 空 */
.empty{
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:18px;
  color:#555;
}

/* 削除ボタン */
.clear-btn{
  margin-top:30px;
  width:100%;

  border:none;
  border-radius:20px;
  padding:15px;

  background:black;
  color:white;
  font-size:16px;

  cursor:pointer;
}

.clear-btn:active{
  transform:scale(0.95);
}

/* スマホ */
@media screen and (max-width:500px){
  .title{
    font-size:28px;
  }

  .section-title{
    font-size:20px;
  }
}

</style>
</head>

<body>

<!-- 戻る -->
<button class="back-btn"
onclick="location.href='index.html'">
戻る
</button>

<div class="container">

  <h1 class="title">過去の記録</h1>

  <!-- 習慣 -->
  <h2 class="section-title">習慣履歴</h2>
  <div id="habitHistory"></div>

  <!-- 占い -->
  <h2 class="section-title">占い履歴</h2>
  <div id="fortuneHistory"></div>

  <!-- 全削除 -->
  <button class="clear-btn"
          onclick="clearHistory()">
    すべて削除
  </button>

</div>

<script>

/* ===== 読み込み ===== */
function loadHistory(){

  const habitData =
    JSON.parse(
      localStorage.getItem("habitData")
    ) || [];

  const fortuneData =
    JSON.parse(
      localStorage.getItem("fortuneData")
    ) || [];

  const habitBox =
    document.getElementById("habitHistory");

  const fortuneBox =
    document.getElementById("fortuneHistory");

  habitBox.innerHTML = "";
  fortuneBox.innerHTML = "";

  /* 習慣 */
  if(habitData.length === 0){
    habitBox.innerHTML =
      `<div class="empty">
        まだ習慣記録がありません
      </div>`;
  }else{
    habitData.forEach(item => {
      habitBox.innerHTML += `
        <div class="card">
          <h2>${item.text}</h2>
          <p>期限：${item.date || "未設定"}</p>
        </div>
      `;
    });
  }

  /* 占い */
  if(fortuneData.length === 0){
    fortuneBox.innerHTML =
      `<div class="empty">
        まだ占い履歴がありません
      </div>`;
  }else{
    fortuneData.forEach(item => {
      fortuneBox.innerHTML += `
        <div class="card">
          <h2>${item.result}</h2>
          <p>${item.date}</p>
        </div>
      `;
    });
  }
}

/* ===== 全削除 ===== */
function clearHistory(){

  if(confirm("履歴を全部削除しますか？")){
    localStorage.removeItem("habitData");
    localStorage.removeItem("fortuneData");
    loadHistory();
  }
}

/* 初回 */
window.onload = loadHistory;

</script>

</body>
</html>
